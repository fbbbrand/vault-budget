services:
  - type: web
    name: vault-budget
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /opt/render/project/data/vault.db
    disk:
      name: vault-data
      mountPath: /opt/render/project/data
      sizeGB: 1
